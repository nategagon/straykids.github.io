<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stray Kids Popularity Index</title>
    <style>
        :root {
            --skz-red: #ff0000;
            --skz-black: #1a1a1a;
            --skz-white: #f4f4f4;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--skz-black);
            color: var(--skz-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            border-bottom: 3px solid var(--skz-red);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: #222;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .member-row {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #333;
            transition: background 0.3s;
        }
        .member-row:hover { background: #2a2a2a; }
        .rank {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--skz-red);
            width: 40px;
        }
        .name {
            flex-grow: 1;
            font-size: 1.2rem;
            font-weight: 500;
        }
        .score {
            font-family: 'Courier New', Courier, monospace;
            color: #888;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>SKZ Popularity Index</h1>
    <p>Live rankings updated every 12 hours</p>

    <div class="container" id="ranking-container">
        <p style="padding: 20px;">Loading live data...</p>
    </div>

    <div class="footer" id="update-time"></div>

    <script>
        // This is the magic that reads the JSON file GitHub creates
        async function loadRankings() {
            try {
                // We add a random number to the URL to make sure 
                // the browser doesn't show an "old" version (Cache Busting)
                const response = await fetch('skz_data.json?t=' + Date.now());
                const data = await response.json();
                
                const container = document.getElementById('ranking-container');
                const timeFooter = document.getElementById('update-time');
                
                container.innerHTML = ''; // Clear the loading message

                data.forEach((member) => {
                    const row = document.createElement('div');
                    row.className = 'member-row';
                    row.innerHTML = `
                        <div class="rank">#${member.rank}</div>
                        <div class="name">${member.name}</div>
                        <div class="score">${member.score.toLocaleString()} points</div>
                    `;
                    container.appendChild(row);
                });

                if (data.length > 0) {
                    timeFooter.innerText = "Last Synchronized: " + data[0].last_update;
                }
            } catch (error) {
                console.error("Error loading rankings:", error);
                document.getElementById('ranking-container').innerHTML = "<p>Failed to load rankings.</p>";
            }
        }

        loadRankings();
    </script>
</body>
</html>
